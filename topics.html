  // active data state
  let activeList = opinionsList;        // default "Opinions & Debates"
  let activeType = "opinions";          // 'opinions' or 'open'

  // DOM elements
  const opinionBtn = document.getElementById('opinionTabBtn');
  const openBtn = document.getElementById('openTabBtn');
  const randomBtn = document.getElementById('randomBtn');
  const categorySpan = document.getElementById('topicCategory');
  const indexSpan = document.getElementById('topicIndex');
  const topicTextDiv = document.getElementById('topicText');
  const totalBadge = document.getElementById('totalCountBadge');
  const showcaseDiv = document.getElementById('topicShowcase');

  function animateCard() {
    showcaseDiv.style.animation = 'none';
    showcaseDiv.offsetHeight;
    showcaseDiv.style.animation = 'fadeSlide 0.3s ease-out';
  }

  function updateBadge() {
    const count = activeList.length;
    if (activeType === 'opinions') {
      totalBadge.innerHTML = `📋 ${count} topics · opinions & debates`;
    } else {
      totalBadge.innerHTML = `✨ ${count} topics · open-ended questions`;
    }
  }

  function displayRandomTopic() {
    if (!activeList.length) return;
    const randomIndex = Math.floor(Math.random() * activeList.length);
    const topic = activeList[randomIndex];
    // For opinions: we show sub-category like "Education & Learning"
    // For open-ended: category is like "Personal Experience" etc.
    categorySpan.textContent = topic.category;
    indexSpan.textContent = `#${String(topic.id).padStart(3, '0')}`;
    topicTextDiv.textContent = topic.text;
    animateCard();
  }

  function setActiveCategory(type) {
    if (type === 'opinions') {
      activeList = opinionsList;
      activeType = 'opinions';
      opinionBtn.classList.add('active');
      openBtn.classList.remove('active');
    } else {
      activeList = openEndedList;
      activeType = 'open';
      openBtn.classList.add('active');
      opinionBtn.classList.remove('active');
    }
    updateBadge();
    displayRandomTopic(); // show fresh random from selected category
  }

  // event listeners
  opinionBtn.addEventListener('click', () => setActiveCategory('opinions'));
  openBtn.addEventListener('click', () => setActiveCategory('open'));
  randomBtn.addEventListener('click', displayRandomTopic);

  // initialize: opinions first, show random prompt
  setActiveCategory('opinions');
</script>
